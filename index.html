<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-97902571-5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-97902571-5');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4523112948468173"
        crossorigin="anonymous"></script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Website Viewer - Real-time HTML and CSS Editor and Live Previewer">
    
    <title>Website Viewer</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="https://www.onlineviewer.net/onlineviewer.v3.css">
    <link rel="icon" href="https://www.onlineviewer.net/favicon.ico" />

    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-html.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>

    <style>
        /* Custom Tab Styling */
        .mode-tabs {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
        }
        .mode-tabs button {
            flex: 1;
            font-weight: bold;
        }
        .mode-tabs button.active {
            background-color: #337ab7;
            color: #fff;
            border-color: #2e6da4;
        }
        #cssEditorContainer {
            display: none;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="cover"></div>
    <div id="separ"></div>
    <div id="view">
        <!-- Sidebar Controls -->
        <div id="sidebar">
            <h1 class="header"><a href="#" class="linkColor">Website Viewer</a></h1>

            <!-- Code Switcher Buttons -->
            <div class="mode-tabs">
                <button id="tabHtml" onclick="switchEditor('html')" class="btn btn-default btn-sm active">
                    <i class="fa fa-code"></i> HTML
                </button>
                <button id="tabCss" onclick="switchEditor('css')" class="btn btn-default btn-sm">
                    <i class="fa fa-css3"></i> CSS
                </button>
            </div>

            <div id="textViewButtons">
                <button onclick="updatePreview()" class="btn btn-primary btn-sm btn-block"><i class="fa fa-play fa-lg fa-fw"></i> Run / Update</button>
                <button onclick="formatCurrentCode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-indent fa-lg fa-fw"></i> Format Code</button>
                <button id="btnSample" onclick="loadSampleCode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-file-text-o fa-lg fa-fw"></i> Load Sample</button>
                <button id="btnClear" onclick="clearCurrentCode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-file-o fa-lg fa-fw"></i> Clear Active</button>
                
                <a id="btnSupport" style="margin-top: 21px"
                    href="https://www.discordapp.com/users/1293198183433900135" target="_blank"
                    class="btn btn-default btn-sm btn-block">
                    <i class="fa fa-bug fa-lg fa-fw"></i> Report Bugs</a>
            </div>

            <div id="aboutButtons">
                <button style="margin-bottom: 5px; margin-top: 5px;" id="btnCookies"
                    onclick="googlefc.callbackQueue.push(googlefc.showRevocationMessage)"
                    class="btn btn-default btn-sm btn-block"><i class="fa fa-shield fa-lg fa-fw"></i> Privacy settings</button>
                <div class="copyrightText">
                    <span id="copyright"></span> <a id="copyrightName"
                        href="https://expertcrafts.github.io">By ExpertCrafts</a><br />
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div id="content">
            <div id="textView">
                <!-- HTML Editor Box -->
                <div id="htmlEditorContainer" style="height: 100%;">
                    <div id="htmlEditor" style="height: 100%; width: 100%;"></div>
                </div>
                <!-- CSS Editor Box -->
                <div id="cssEditorContainer">
                    <div id="cssEditor" style="height: 100%; width: 100%;"></div>
                </div>
            </div>
            
            <!-- Live Combined Output -->
            <div id="livePreview">
                <iframe id="liveFrame" title="Live Website Preview" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts"></iframe>
            </div>
        </div>

        <div id="rightsidebar"></div>
    </div>

    <script>
        var currentTab = 'html';
        var htmlAce, cssAce;

        window.onload = function() {
            // Initialize HTML Ace Editor
            htmlAce = ace.edit("htmlEditor");
            htmlAce.setTheme("ace/theme/chrome");
            htmlAce.session.setMode("ace/mode/html");
            htmlAce.setValue("<!-- Write your HTML here -->\n<div class=\"card\">\n  <h1>Hello World!</h1>\n  <p>Edit HTML and CSS to see live updates.</p>\n</div>", 1);

            // Initialize CSS Ace Editor
            cssAce = ace.edit("cssEditor");
            cssAce.setTheme("ace/theme/chrome");
            cssAce.session.setMode("ace/mode/css");
            cssAce.setValue("/* Write your CSS here */\nbody {\n  font-family: sans-serif;\n  background: #222;\n  color: #fff;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n}\n\n.card {\n  background: #333;\n  padding: 20px;\n  border-radius: 8px;\n  text-align: center;\n}", 1);

            // Auto-update iframe on typing
            htmlAce.on("change", updatePreview);
            cssAce.on("change", updatePreview);

            updatePreview();
        };

        // Switch between HTML & CSS tabs
        function switchEditor(type) {
            currentTab = type;
            if (type === 'html') {
                $('#htmlEditorContainer').show();
                $('#cssEditorContainer').hide();
                $('#tabHtml').addClass('active');
                $('#tabCss').removeClass('active');
                htmlAce.focus();
            } else {
                $('#htmlEditorContainer').hide();
                $('#cssEditorContainer').show();
                $('#tabCss').addClass('active');
                $('#tabHtml').removeClass('active');
                cssAce.focus();
            }
        }

        // Merge HTML + CSS into iframe
        function updatePreview() {
            var htmlVal = htmlAce.getValue();
            var cssVal = cssAce.getValue();
            
            var fullDoc = `
                <!DOCTYPE html>
                <html>
                <head>
                    <style>${cssVal}</style>
                </head>
                <body>
                    ${htmlVal}
                </body>
                </html>
            `;

            var iframe = document.getElementById('liveFrame');
            iframe.srcdoc = fullDoc;
        }

        // Format active editor using JS Beautify
        function formatCurrentCode() {
            if (currentTab === 'html') {
                var formatted = html_beautify(htmlAce.getValue());
                htmlAce.setValue(formatted, 1);
            } else {
                var formatted = css_beautify(cssAce.getValue());
                cssAce.setValue(formatted, 1);
            }
        }

        // Clear active tab
        function clearCurrentCode() {
            if (currentTab === 'html') {
                htmlAce.setValue("", 1);
            } else {
                cssAce.setValue("", 1);
            }
        }

        // Load basic starter code
        function loadSampleCode() {
            htmlAce.setValue("<div class=\"box\">\n  <h2>ExpertCrafts Website Viewer</h2>\n  <button>Click Me</button>\n</div>", 1);
            cssAce.setValue(".box {\n  padding: 20px;\n  border: 2px solid #337ab7;\n  border-radius: 10px;\n  font-family: Arial, sans-serif;\n  text-align: center;\n}\n\nbutton {\n  padding: 8px 16px;\n  background: #337ab7;\n  color: white;\n  border: none;\n  border-radius: 4px;\n  cursor: pointer;\n}", 1);
            updatePreview();
        }
    </script>
</body>

</html>
