<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=UA-97902571-5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'UA-97902571-5');
    </script>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4523112948468173"
        crossorigin="anonymous"></script>

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Website Viewer - Real-time HTML and CSS Editor and Live Previewer">
    <meta name="keywords" content="Website Viewer, HTML Viewer, CSS Viewer, Live Preview, ExpertCrafts">

    <title>Website Viewer</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css" integrity="sha384-HSMxcRTRxnN+Bdg0JdbxYKrThecOKuH5zCYotlSAcp1+c8xmyTe9GYg1l9a69psu" crossorigin="anonymous">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="//www.onlineviewer.net/onlineviewer.v3.css">
    <link rel="icon" href="//www.onlineviewer.net/favicon.ico" />

    <!-- External Libraries -->
    <script src="//www.onlineviewer.net/vkbeautify.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-html.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.43.3/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/js/bootstrap.min.js" integrity="sha384-aJ21OjlMXNL5UyIl/XNwTMqvzeRMZH2w8c5cRVpzpU8Y5bApTppSuUkhZXN0VxHd" crossorigin="anonymous"></script>

    <style>
        .mode-tabs {
            margin-bottom: 15px;
            display: flex;
            gap: 5px;
        }
        .mode-tabs button {
            flex: 1;
            font-weight: bold;
        }
        .mode-tabs button.active {
            background-color: #337ab7;
            color: #fff;
            border-color: #2e6da4;
        }
        #cssEditorContainer {
            display: none;
            height: 100%;
        }
    </style>
</head>

<body>
    <div id="cover"></div>
    <div id="separ"></div>
    <div id="view">
        <!-- Sidebar Controls -->
        <div id="sidebar">
            <h1 class="header"><a href="#" class="linkColor">Website Viewer</a></h1>

            <!-- Code Switcher Buttons -->
            <div class="mode-tabs">
                <button id="tabHtml" onclick="switchEditor('html')" class="btn btn-default btn-sm active">
                    <i class="fa fa-code"></i> HTML
                </button>
                <button id="tabCss" onclick="switchEditor('css')" class="btn btn-default btn-sm">
                    <i class="fa fa-css3"></i> CSS
                </button>
            </div>

            <div id="textViewButtons">
                <button onclick="openHtmlPreview()" class="btn btn-default btn-sm btn-block"><i class="fa fa-eye fa-lg fa-fw"></i> Preview (Full page)</button>
                <button onclick="openHighlightedSyntax()" class="btn btn-default btn-sm btn-block"><i class="fa fa-edit fa-lg fa-fw"></i> Highlight (Full page)</button>
                <button onclick="formatCurrentCode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-indent fa-lg fa-fw"></i> Format</button>
                <button onclick="unfoldAll()" class="btn btn-default btn-sm btn-block"><i class="fa fa-plus-square fa-lg fa-fw"></i> Expand all</button>
                <button onclick="foldAll()" class="btn btn-default btn-sm btn-block"><i class="fa fa-minus-square fa-lg fa-fw"></i> Collapse all</button>
                <button id="btnClear" onclick="clearCurrentCode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-file-o fa-lg fa-fw"></i> Clear</button>
                <button id="btnImport" onclick="importText()" class="btn btn-default btn-sm btn-block"><i class="fa fa-upload fa-lg fa-fw"></i> Import from file</button>
                <button id="btnExport" onclick="exportText()" class="btn btn-default btn-sm btn-block"><i class="fa fa-download fa-lg fa-fw"></i> Export to file</button>
                <button id="btnDark" onclick="changeToDarkMode()" class="btn btn-default btn-sm btn-block"><i class="fa fa-moon-o fa-lg fa-fw"></i> Dark mode</button>
                <button id="btnLight" onclick="changeToLightMode()" class="btn btn-default btn-sm btn-block" style="display:none"><i class="fa fa-sun-o fa-lg fa-fw"></i> Light mode</button>
                
                <a id="btnSupport" style="margin-top: 21px"
                    href="https://www.discordapp.com/users/1293198183433900135" target="_blank"
                    class="btn btn-default btn-sm btn-block">
                    <i class="fa fa-thumbs-up fa-lg fa-fw"></i> Report Bugs</a>
                <input type="file" id="inpImport" onclick="this.value=null;" accept="text/*" style="display:none">
            </div>

            <div id="aboutButtons">
                <button style="margin-bottom: 5px; margin-top: 5px;" id="btnCookies"
                    onclick="googlefc.callbackQueue.push(googlefc.showRevocationMessage)"
                    class="btn btn-default btn-sm btn-block"><i class="fa fa-shield fa-lg fa-fw"></i> Privacy settings</button>
                <div class="copyrightText">
                    <span id="copyright"></span> <a id="copyrightName"
                        href="https://expertcrafts.github.io">By ExpertCrafts</a><br />
                </div>
            </div>
        </div>

        <!-- Main Workspace -->
        <div id="content">
            <div id="textView">
                <!-- HTML Editor Box -->
                <div id="htmlEditorContainer" style="height: 100%;">
                    <div id="htmlEditor" style="height: 100%; width: 100%;"></div>
                </div>
                <!-- CSS Editor Box -->
                <div id="cssEditorContainer">
                    <div id="cssEditor" style="height: 100%; width: 100%;"></div>
                </div>
            </div>
            
            <!-- Live Combined Output -->
            <div id="livePreview">
                <iframe id="liveFrame" title="Live Website Preview" sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts"></iframe>
            </div>
        </div>

        <div id="rightsidebar"></div>
        <div id="leftbottomabs">
            <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4523112948468173" crossorigin="anonymous"></script>
            <ins class="adsbygoogle" style="display:inline-block;width:200px;height:200px" data-ad-client="ca-pub-4523112948468173" data-ad-slot="4008251510"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>

    <script>
        var pageType = 'HTML';
        var currentTab = 'html';
        var htmlAce, cssAce;

        // Starter Samples
        var initialHtml = `<div class="container">\n  <h1>Hello World!</h1>\n  <p>Welcome to the Website Viewer.</p>\n  <button class="btn-demo">Click Me</button>\n</div>`;
        
        var initialCss = `body {\n  font-family: Arial, sans-serif;\n  background-color: #1e1e2e;\n  color: #cdd6f4;\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n}\n\n.container {\n  text-align: center;\n  background: #313244;\n  padding: 30px;\n  border-radius: 12px;\n  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);\n}\n\nh1 {\n  color: #89b4fa;\n  margin-bottom: 10px;\n}\n\n.btn-demo {\n  background: #a6e3a1;\n  color: #11111b;\n  border: none;\n  padding: 10px 20px;\n  font-weight: bold;\n  border-radius: 6px;\n  cursor: pointer;\n  transition: 0.2s;\n}\n\n.btn-demo:hover {\n  background: #94e2d5;\n}`;

        window.onload = function() {
            // Initialize HTML Ace Editor
            htmlAce = ace.edit("htmlEditor");
            htmlAce.setTheme("ace/theme/chrome");
            htmlAce.session.setMode("ace/mode/html");
            htmlAce.setValue(initialHtml, 1);

            // Initialize CSS Ace Editor
            cssAce = ace.edit("cssEditor");
            cssAce.setTheme("ace/theme/chrome");
            cssAce.session.setMode("ace/mode/css");
            cssAce.setValue(initialCss, 1);

            // Sync with default script reference
            window.editor = htmlAce;

            // Live updates on typing
            htmlAce.on("change", updatePreview);
            cssAce.on("change", updatePreview);

            updatePreview();
        };

        // Switch between HTML & CSS tabs
        function switchEditor(type) {
            currentTab = type;
            if (type === 'html') {
                $('#htmlEditorContainer').show();
                $('#cssEditorContainer').hide();
                $('#tabHtml').addClass('active');
                $('#tabCss').removeClass('active');
                window.editor = htmlAce;
                htmlAce.focus();
            } else {
                $('#htmlEditorContainer').hide();
                $('#cssEditorContainer').show();
                $('#tabCss').addClass('active');
                $('#tabHtml').removeClass('active');
                window.editor = cssAce;
                cssAce.focus();
            }
        }

        // Helper to combine HTML + CSS into a full document
        function getCombinedSource() {
            var htmlVal = htmlAce ? htmlAce.getValue() : "";
            var cssVal = cssAce ? cssAce.getValue() : "";
            return `<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>${cssVal}</style>
</head>
<body>
    ${htmlVal}
</body>
</html>`;
        }

        // Merge HTML + CSS into live preview iframe
        function updatePreview() {
            if (!htmlAce || !cssAce) return;
            var iframe = document.getElementById('liveFrame');
            if (iframe) {
                iframe.srcdoc = getCombinedSource();
            }
        }

        // Override default openHtmlPreview to include BOTH HTML and CSS
        function openHtmlPreview() {
            var fullCode = getCombinedSource();
            var blob = new Blob([fullCode], { type: 'text/html' });
            var url = URL.createObjectURL(blob);
            window.open(url, '_blank');
        }

        // Context-aware formatting
        function formatCurrentCode() {
            if (currentTab === 'html') {
                if (typeof formatHtml === 'function') {
                    formatHtml();
                } else if (typeof html_beautify === 'function') {
                    htmlAce.setValue(html_beautify(htmlAce.getValue()), 1);
                }
            } else {
                if (typeof formatCss === 'function') {
                    formatCss();
                } else if (typeof css_beautify === 'function') {
                    cssAce.setValue(css_beautify(cssAce.getValue()), 1);
                }
            }
        }

        // Clear active tab
        function clearCurrentCode() {
            if (currentTab === 'html') {
                htmlAce.setValue("", 1);
            } else {
                cssAce.setValue("", 1);
            }
            updatePreview();
        }
    </script>
    <script src="//www.onlineviewer.net/onlineviewer.min.v5.js"></script>
</body>

</html>
