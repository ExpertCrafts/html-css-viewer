        content="HTML Online Viewer is a fast HTML editor and formatter with an instant live preview. View, edit and format your HTML in real-time!">

    <link rel="icon" href="//www.onlineviewer.net/favicon.ico" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify-css.min.js"></script>

        crossorigin="anonymous"></script>

<body>
    <div id="cover"></div>
    <div id="separ"></div>
    <div id="view">
        <div id="sidebar">
            <h1 class="header"><a href="https://html.onlineviewer.net/" class="linkColor">HTML Online Viewer</a></h1>
            <div id="textViewButtons">
                <button onclick="openHtmlPreview()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-eye fa-lg fa-fw"></i> Preview (Full page)</button>
                <button onclick="openHighlightedSyntax()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-edit fa-lg fa-fw"></i> Highlight (Full page)</button>
                <button onclick="formatHtml();" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-indent fa-lg fa-fw"></i> Format</button>
                <button onclick="unfoldAll()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-plus-square fa-lg fa-fw"></i> Expand all</button>
                <button onclick="foldAll();" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-minus-square fa-lg fa-fw"></i> Collapse all</button>
                <button id="btnSample" onclick="insertSample()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-file-text-o fa-lg fa-fw"></i> Sample</button>
                <button id="btnClear" onclick="clearTextInput()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-file-o fa-lg fa-fw"></i> Clear</button>
                <button id="btnImport" onclick="importText()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-upload fa-lg fa-fw"></i> Import from file</button>
                <button id="btnExport" onclick="exportText()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-download fa-lg fa-fw"></i> Export to file</button>
                <button id="btnDark" onclick="changeToDarkMode()" class="btn btn-default btn-sm btn-block"><i
                        class="fa fa-moon-o fa-lg fa-fw"></i> Dark mode</button>
                <button id="btnLight" onclick="changeToLightMode()" class="btn btn-default btn-sm btn-block"
                    style="display:none"><i class="fa fa-sun-o fa-lg fa-fw"></i> Light mode</button>
                <a id="btnSupport" style="margin-top: 21px"
                    href="https://www.discordapp.com/users/1293198183433900135" target="_blank"
                    class="btn btn-default btn-sm btn-block">
                    <i class="fa fa-thumbs-up fa-lg fa-fw"></i> Report Bugs</a>
                <input type="file" id="inpImport" onclick="this.value=null;" accept="text/*" style="display:none">
            </div>
            <div id="aboutButtons">
                <button style="margin-bottom: 5px; margin-top: 5px;" id="btnCookies"
                    onclick="googlefc.callbackQueue.push(googlefc.showRevocationMessage)"
                    class="btn btn-default btn-sm btn-block"><i class="fa fa-shield fa-lg fa-fw"></i> Privacy
                    settings</button>
                <div class="copyrightText">
                    <span id="copyright"></span> <a id="copyrightName"
                        href="https://expertcrafts.github.io">By ExpertCrafts</a><br />
                </div>
            </div>
        </div>
        <div id="content">
            <div id="textView">
                <div id="editor">Put your HTML text here</div>
            </div>
            <div id="livePreview">
                <iframe id="liveFrame" title="Live HTML Preview" srcdoc=""
                    sandbox="allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-popups allow-presentation allow-scripts"></iframe>
            </div>
        </div>
        <div id="rightsidebar">

        </div>
        <div id="leftbottomabs">
            <script async
                src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4523112948468173"
                crossorigin="anonymous"></script>
            <!-- Sidebar bottom -->
            <ins class="adsbygoogle" style="display:inline-block;width:200px;height:200px"
                data-ad-client="ca-pub-4523112948468173" data-ad-slot="4008251510"></ins>
            <script>
                (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>
    </div>
    <script>
        var pageType = 'HTML';
    </script>
    <script src="//www.onlineviewer.net/onlineviewer.min.v5.js"></script>
</body>

</html>
